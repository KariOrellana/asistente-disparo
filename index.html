  <style>

<body>
  <div id="root"></div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const LENS = {
      sigma30: { name: "Sigma 30mm", sub: "f/1.4 · 45mm equiv.", filter: "filtro 52mm" },
      sigma16: { name: "Sigma 16mm", sub: "f/1.4 · 24mm equiv.", filter: "filtro 67mm" },
      kit:     { name: "Sony 16-50mm", sub: "kit · 24–75mm equiv.", filter: "estabilizado" },
      tele:    { name: "Sony 55-210mm", sub: "tele · 82–315mm equiv.", filter: "estabilizado" },
    };
    const LENS_ORDER = ["sigma16", "sigma30", "kit", "tele"];
    const MAXAP = { sigma16: 1.4, sigma30: 1.4, kit: 4, tele: 5.6 };

    const SUBJECTS = {
      retrato: { t: "Bebé / persona", frame: "retrato", rank: ["sigma30", "kit", "tele", "sigma16"],
        ap: (p, l) => (p === "desenfoque" ? (l === "poca" ? 1.4 : 1.8) : 2.5),
        focus: (m) => (m === "movimiento" ? "AF-C · Ojos (seguimiento)" : "AF-C · Ojos"),
        tip: (p) => (p === "desenfoque" ? "A f/1.4–1.8 la zona nítida es de pocos centímetros: apunta al ojo y deja que el Eye AF trabaje." : "Cierra a f/2.5 para que toda la cara salga nítida."),
        framing: ["Coloca al bebé sobre una línea de la grilla, no en el centro.", "Baja la cámara hasta el nivel de sus ojos.", "Deja aire hacia donde mira o se mueve."] },
      grupo: { t: "Grupo / familia", frame: "grupo", rank: ["sigma16", "kit", "sigma30", "tele"],
        ap: (p) => (p === "desenfoque" ? 2.8 : 4),
        focus: (m) => (m === "movimiento" ? "AF-C · Ojos (seguimiento)" : "AF-C · Ojos"),
        tip: () => "Cierra a f/2.8–4 para que toda la fila salga enfocada, no solo la primera persona.",
        framing: ["Acércate y llena el cuadro; evita el espacio muerto.", "Que nadie quede cortado por los bordes.", "Ordena las cabezas en una curva suave, no en fila rígida."] },
      mascotas: { t: "Mascotas", frame: "retrato", rank: ["sigma30", "kit", "tele", "sigma16"],
        ap: (p) => (p === "desenfoque" ? 1.8 : 2.8), focus: () => "AF-C · Ojos (animal)",
        tip: () => "Tu A6400 detecta ojos de animal: actívalo. Baja a su altura y dispara rápido cuando esté tranquilo.",
        framing: ["Baja a la altura del animal, no dispares desde arriba.", "Enfoca el ojo más cercano.", "Espera el gesto: orejas arriba, mirada a cámara."] },
      animales: { t: "Animales", frame: "lejano", rank: ["tele", "sigma30", "kit", "sigma16"],
        ap: (p) => (p === "nitidez" ? 8 : 5.6), focus: () => "AF-C · Ojos (animal)",
        tip: () => "Detección de ojos de animal activada. Mantén distancia, usa el tele y sube la velocidad si se mueve.",
        framing: ["Enfoca el ojo; deja aire hacia donde mira.", "Fondo limpio para aislar al animal.", "Mantén distancia y respeta su espacio."] },
      aves: { t: "Aves", frame: "lejano", rank: ["tele", "sigma30", "kit", "sigma16"],
        ap: (p) => (p === "nitidez" ? 8 : 5.6), focus: () => "AF-C · Seguimiento",
        tip: () => "Velocidad alta (1/1000+) y AF-C. Apóyate o sube el ISO: el tele pide luz. Acércate con paciencia.",
        framing: ["Deja espacio hacia donde mira o vuela el ave.", "Busca un fondo limpio para que destaque.", "Enfoca el ojo y dispara en ráfaga."] },
      deporte: { t: "Deporte / acción", frame: "lejano", rank: ["tele", "sigma30", "kit", "sigma16"],
        ap: (p) => (p === "desenfoque" ? 2.8 : 4), focus: () => "AF-C · Seguimiento",
        tip: () => "Velocidad 1/1000 o más para congelar la acción. Usa ráfaga y AF-C con seguimiento.",
        framing: ["Anticipa: encuadra donde va a ocurrir la acción.", "Deja espacio hacia donde se mueve el sujeto.", "Dispara en ráfaga y elige la mejor después."] },
      calle: { t: "Calle / ciudad", frame: "calle",
        rank: (p) => (p === "desenfoque" ? ["sigma30", "sigma16", "kit", "tele"] : ["sigma16", "kit", "sigma30", "tele"]),
        ap: (p) => (p === "desenfoque" ? 2.8 : 5.6), focus: () => "AF-C · Área amplia",
        tip: (p) => (p === "nitidez" ? "f/5.6–8 da nitidez de adelante hacia atrás, ideal para escenas urbanas con profundidad." : "Para aislar a alguien en la calle, el 30mm a f/2.8 separa al sujeto del fondo."),
        framing: ["Usa las líneas de la calle para llevar la mirada al fondo.", "Pon el punto de interés en una intersección de la grilla.", "Busca un marco natural: un arco, una puerta, un árbol."] },
      arquitectura: { t: "Arquitectura", frame: "calle", rank: ["sigma16", "kit", "sigma30", "tele"],
        ap: (p) => (p === "desenfoque" ? 4 : 8), focus: () => "AF-S · Punto único",
        tip: () => "Cámara nivelada para que las verticales no se caigan. f/8 para nitidez pareja. Busca simetría.",
        framing: ["Cuida las verticales: cámara nivelada, líneas rectas.", "Busca simetría, patrones o un punto de fuga.", "Una persona pequeña le da escala al edificio."] },
      paisaje: { t: "Paisaje", frame: "paisaje", rank: ["sigma16", "kit", "sigma30", "tele"],
        ap: (p) => (p === "desenfoque" ? 5.6 : 8), focus: (m) => (m === "movimiento" ? "AF-C · Punto flexible" : "AF-S · Punto único"),
        tip: () => "f/8 es donde estos lentes rinden más nítido. Enfoca en el primer tercio de la escena.",
        framing: ["Horizonte en el tercio inferior si el cielo manda; arriba si manda el suelo.", "Suma algo en primer plano para dar profundidad.", "Revisa que el horizonte quede recto."] },
      atardecer: { t: "Atardecer", frame: "paisaje", rank: ["sigma16", "kit", "sigma30", "tele"],
        ap: (p) => (p === "desenfoque" ? 5.6 : 8), focus: () => "AF-S · Punto único",
        tip: () => "Mide hacia el cielo para siluetas o hacia el suelo para detalle. Baja el ISO; la luz cálida dura poco.",
        framing: ["Horizonte en un tercio; deja que el cielo protagonice.", "Silueta un sujeto contra el sol para dar drama.", "Sigue disparando en la 'hora azul', 20 min después."] },
      flores: { t: "Flores", frame: "flores", rank: ["sigma30", "tele", "kit", "sigma16"],
        ap: (p) => (p === "desenfoque" ? 2.5 : 8), focus: () => "AF-S · Punto flexible",
        tip: () => "Enfoca el centro de la flor y cierra a f/2.8–4 para que el pétalo entero salga nítido. Cuidado con el viento.",
        framing: ["Aísla una sola flor para un sujeto claro.", "Fondo limpio y lejano = mejor desenfoque.", "Si hay viento, sube la velocidad para que no salga movida."] },
      comida: { t: "Comida", frame: "comida", rank: ["sigma30", "kit", "sigma16", "tele"],
        ap: (p) => (p === "desenfoque" ? 2.8 : 4), focus: () => "AF-S · Punto flexible",
        tip: () => "Acércate hasta donde el lente enfoca (30 cm en el 30mm). Busca luz lateral de ventana y evita el flash.",
        framing: ["Dispara cenital (desde arriba) o a 45°, según el plato.", "Luz natural de costado; nada de flash directo.", "Deja respirar el plato; quita lo que sobra de la mesa."] },
      lejano: { t: "Algo lejano", frame: "lejano", rank: ["tele", "kit", "sigma30", "sigma16"],
        ap: (p) => (p === "nitidez" ? 8 : 5.6), focus: (m) => (m === "movimiento" ? "AF-C · Punto flexible" : "AF-S · Punto único"),
        tip: () => "El 55-210mm sí tiene estabilización óptica: aprovéchala cuando baje la luz.",
        framing: ["El tele comprime el fondo: aísla un solo sujeto.", "Sube la velocidad o apóyate: el tele acentúa el temblor.", "Llena el cuadro con el sujeto y recorta lo que sobra."] },
    };
    const SUBJECT_ORDER = ["retrato", "grupo", "mascotas", "animales", "aves", "deporte", "calle", "arquitectura", "paisaje", "atardecer", "flores", "comida", "lejano"];

    const QUESTIONS = [
      { key: "subject", label: "¿Qué fotografías?", options: SUBJECT_ORDER.map((k) => ({ v: k, t: SUBJECTS[k].t })) },
      { key: "light", label: "¿Cuánta luz hay?", options: [{ v: "mucha", t: "Exterior, día" }, { v: "media", t: "Interior luminoso" }, { v: "poca", t: "Tenue / atardecer" }] },
      { key: "motion", label: "¿Se mueve el sujeto?", options: [{ v: "quieto", t: "Quieto" }, { v: "movimiento", t: "Se mueve" }] },
      { key: "priority", label: "¿Qué priorizas?", options: [{ v: "desenfoque", t: "Fondo desenfocado" }, { v: "nitidez", t: "Todo nítido" }, { v: "comodidad", t: "No cambiar lente" }] },
    ];

    function whyFor(lens, subject) {
      if (lens === "tele") return "El teleobjetivo acerca lo lejano y la acción, y va estabilizado.";
      if (lens === "kit") return "Un solo lente del gran angular al tele corto. Cero cambios.";
      if (lens === "sigma16") {
        if (subject === "paisaje" || subject === "atardecer") return "Gran angular para escenas abiertas. Sellado contra el polvo.";
        if (subject === "grupo") return "El ángulo amplio mete a todo el grupo y el ambiente.";
        if (subject === "arquitectura") return "Gran angular para abarcar edificios completos.";
        return "Gran angular luminoso: amplio y muy bueno con poca luz.";
      }
      if (subject === "comida" || subject === "flores") return "Focal normal luminosa: ideal para detalles cercanos con fondo cremoso.";
      if (subject === "retrato" || subject === "mascotas") return "Focal normal, ideal para retratos sin alejarte. f/1.4 da fondo cremoso.";
      return "Focal normal luminosa: el todoterreno para el día a día.";
    }

    function recommend({ subject, light, motion, priority }, available) {
      const S = SUBJECTS[subject] || SUBJECTS.retrato;
      const rankRaw = priority === "comodidad" ? ["kit", "sigma30", "sigma16", "tele"] : (typeof S.rank === "function" ? S.rank(priority) : S.rank);
      const ideal = rankRaw[0];
      const lens = rankRaw.find((l) => available.includes(l)) || ideal;
      const swap = lens !== ideal ? `Lo ideal aquí sería el ${LENS[ideal].name}, pero con lo que llevas, el ${LENS[lens].name} cumple.` : null;
      const whyText = whyFor(lens, subject);

      let f, fLabel, fNote = "";
      if (priority === "comodidad" && lens === "kit") { f = 5.6; fLabel = "auto"; fNote = "modo A, la cámara decide (≈ f/5.6)"; }
      else {
        const want = priority === "comodidad" ? 5.6 : S.ap(priority, light);
        f = Math.max(want, MAXAP[lens]); fLabel = "f/" + f;
        if (f > want) fNote = "lo más abierto del " + (lens === "kit" ? "kit" : lens === "tele" ? "tele" : "lente") + " a esa focal";
      }

      const fast = subject === "deporte" || subject === "aves";
      let shutter;
      if (motion === "movimiento" || fast) shutter = fast ? "1/1000" : "1/500";
      else if (light === "poca") shutter = "1/60";
      else if (light === "media") shutter = "1/125";
      else shutter = "1/250";
      const shutterNote = (motion === "movimiento" || fast) ? "para congelar el movimiento" : (light === "poca" ? "mínima (1/30 con el 16mm)" : "mínima");

      const focus = S.focus(motion);
      const tip = priority === "comodidad" ? "El kit es cómodo pero menos luminoso. En interiores el ISO subirá más que con tus Sigma." : S.tip(priority, light);
      const isSigma = lens === "sigma16" || lens === "sigma30";
      const warn = isSigma && motion === "quieto" && light === "poca" ? "Sin estabilización: si la velocidad cae bajo 1/60, apóyate en algo firme." : null;
      return { lens, whyText, swap, f, fLabel, fNote, shutter, shutterNote, focus, tip, warn };
    }

    function openFrac(f) { const minF = 1.4, maxF = 8; const t = (Math.log(f) - Math.log(minF)) / (Math.log(maxF) - Math.log(minF)); return 0.92 - t * (0.92 - 0.3); }
    function heptagon(cx, cy, r) { const pts = []; for (let i = 0; i < 7; i++) { const a = (Math.PI * 2 * i) / 7 - Math.PI / 2; pts.push(`${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`); } return pts.join(" "); }
    function Iris({ f }) {
      const k = openFrac(f); const base = 46;
      return (
        <svg viewBox="0 0 120 120" width="104" height="104" aria-hidden="true">
          <defs><radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#d8c4fb" stopOpacity="0.95" /><stop offset="60%" stopColor="#9171e0" stopOpacity="0.5" /><stop offset="100%" stopColor="#9171e0" stopOpacity="0" /></radialGradient></defs>
          <circle cx="60" cy="60" r="52" fill="none" stroke="#e3d8f6" strokeWidth="2" /><circle cx="60" cy="60" r="50" fill="none" stroke="#f1ecfb" strokeWidth="6" />
          <g style={{ transform: `scale(${k})`, transformOrigin: "60px 60px", transition: "transform .45s cubic-bezier(.34,1.2,.4,1)" }}>
            <circle cx="60" cy="60" r={base + 4} fill="url(#glow)" /><polygon points={heptagon(60, 60, base)} fill="#ffffff" stroke="#8a63d8" strokeWidth="1.6" strokeLinejoin="round" />
          </g>
          <g stroke="#ece3f9" strokeWidth="1">{[...Array(7)].map((_, i) => { const a = (Math.PI * 2 * i) / 7 - Math.PI / 2; return <line key={i} x1={60 + 50 * Math.cos(a)} y1={60 + 50 * Math.sin(a)} x2={60 + 30 * Math.cos(a)} y2={60 + 30 * Math.sin(a)} />; })}</g>
        </svg>
      );
    }
    function ThirdsGrid() {
      return (<g stroke="#ffffff" strokeOpacity="0.55" strokeWidth="1"><line x1="106.7" y1="0" x2="106.7" y2="200" /><line x1="213.3" y1="0" x2="213.3" y2="200" /><line x1="0" y1="66.7" x2="320" y2="66.7" /><line x1="0" y1="133.3" x2="320" y2="133.3" /></g>);
    }
    function FrameExample({ scene }) {
      const scenes = {
        retrato: (<g><rect width="320" height="200" fill="#efe7fb" /><rect width="320" height="200" fill="url(#softL)" /><circle cx="250" cy="70" r="34" fill="#c9b4f0" opacity="0.45" /><circle cx="285" cy="130" r="22" fill="#d9c9f5" opacity="0.5" /><circle cx="215" cy="150" r="16" fill="#cebbf2" opacity="0.4" /><circle cx="107" cy="96" r="26" fill="#8a63d8" /><path d="M70 200 Q70 150 107 150 Q144 150 144 200 Z" fill="#8a63d8" /><g stroke="#2da98c" strokeWidth="2.4" fill="none"><path d="M104 86 h-9 v-9" /><path d="M120 86 h9 v-9" /><path d="M104 100 h-9 v9" /><path d="M120 100 h9 v9" /></g></g>),
        grupo: (<g><rect width="320" height="200" fill="#efe7fb" /><rect width="320" height="200" fill="url(#softL)" />{[78, 138, 198, 252].map((x, i) => (<g key={i}><circle cx={x} cy={88 + (i % 2 === 0 ? 0 : 10)} r="22" fill={i % 2 ? "#9c7ee0" : "#8a63d8"} /><path d={`M${x - 30} 200 Q${x - 30} 132 ${x} 132 Q${x + 30} 132 ${x + 30} 200 Z`} fill={i % 2 ? "#9c7ee0" : "#8a63d8"} /></g>))}</g>),
        calle: (<g><rect width="320" height="200" fill="#f3eefc" /><rect width="320" height="120" fill="url(#skyL)" /><rect x="0" y="40" width="70" height="160" fill="#cdbcef" /><rect x="250" y="30" width="70" height="170" fill="#bda6ea" /><rect x="62" y="70" width="40" height="130" fill="#d9ccf4" /><rect x="218" y="64" width="42" height="136" fill="#cabbef" /><polygon points="120,200 200,200 175,86 145,86" fill="#e7ddf7" /><line x1="160" y1="200" x2="160" y2="92" stroke="#ffffff" strokeWidth="3" strokeDasharray="9 8" /><circle cx="213" cy="120" r="8" fill="#6c44c0" /><rect x="208" y="128" width="10" height="20" rx="4" fill="#6c44c0" /></g>),
        paisaje: (<g><rect width="320" height="200" fill="url(#skyL)" /><circle cx="213" cy="60" r="20" fill="#c9b4f0" opacity="0.85" /><path d="M0 134 Q80 108 170 134 T320 130 V200 H0 Z" fill="#b9a3e8" /><path d="M0 150 Q120 126 230 152 T320 148 V200 H0 Z" fill="#9171e0" /><path d="M0 172 Q90 158 200 174 T320 170 V200 H0 Z" fill="#7657c9" /></g>),
        lejano: (<g><rect width="320" height="200" fill="url(#skyL)" /><path d="M0 150 Q160 120 320 150 V200 H0 Z" fill="#d4c4f2" /><path d="M0 166 Q160 140 320 166 V200 H0 Z" fill="#b9a3e8" /><path d="M0 182 Q160 162 320 182 V200 H0 Z" fill="#9171e0" /><circle cx="160" cy="67" r="10" fill="#6c44c0" /><g stroke="#2da98c" strokeWidth="2.2" fill="none"><path d="M150 56 h-8 v-8" /><path d="M170 56 h8 v-8" /><path d="M150 78 h-8 v8" /><path d="M170 78 h8 v8" /></g></g>),
        comida: (<g><rect width="320" height="200" fill="#efe7fb" /><rect width="320" height="200" fill="url(#softL)" /><rect x="46" y="84" width="6" height="46" rx="3" fill="#b9a3e8" /><rect x="268" y="84" width="6" height="46" rx="3" fill="#b9a3e8" /><circle cx="160" cy="104" r="66" fill="#ffffff" stroke="#e3d8f6" strokeWidth="3" /><circle cx="160" cy="104" r="42" fill="#cdbcef" /><circle cx="148" cy="94" r="13" fill="#b59be8" /><circle cx="176" cy="114" r="9" fill="#a98fe0" /></g>),
        flores: (<g><rect width="320" height="200" fill="#efe7fb" /><rect width="320" height="200" fill="url(#softL)" /><circle cx="252" cy="150" r="26" fill="#c9b4f0" opacity="0.4" /><circle cx="282" cy="92" r="18" fill="#d9c9f5" opacity="0.5" /><rect x="104" y="100" width="6" height="94" rx="3" fill="#7657c9" /><g transform="translate(107,94)"><ellipse cx="0" cy="-20" rx="9" ry="18" fill="#b9a3e8" /><ellipse cx="0" cy="-20" rx="9" ry="18" fill="#b9a3e8" transform="rotate(60)" /><ellipse cx="0" cy="-20" rx="9" ry="18" fill="#b9a3e8" transform="rotate(120)" /><ellipse cx="0" cy="-20" rx="9" ry="18" fill="#b9a3e8" transform="rotate(180)" /><ellipse cx="0" cy="-20" rx="9" ry="18" fill="#b9a3e8" transform="rotate(240)" /><ellipse cx="0" cy="-20" rx="9" ry="18" fill="#b9a3e8" transform="rotate(300)" /><circle r="11" fill="#8a63d8" /></g><g stroke="#2da98c" strokeWidth="2.2" fill="none"><path d="M97 84 h-8 v-8" /><path d="M117 84 h8 v-8" /><path d="M97 104 h-8 v8" /><path d="M117 104 h8 v8" /></g></g>),
      };
      return (
        <svg viewBox="0 0 320 200" width="100%" style={{ display: "block", borderRadius: 12 }} aria-label="Ejemplo de composición">
          <defs>
            <linearGradient id="softL" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#ffffff" stopOpacity="0.6" /><stop offset="100%" stopColor="#efe7fb" stopOpacity="0" /></linearGradient>
            <linearGradient id="skyL" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#efe6fc" /><stop offset="100%" stopColor="#fbf6ff" /></linearGradient>
            <clipPath id="frameClip"><rect width="320" height="200" rx="12" /></clipPath>
          </defs>
          <g clipPath="url(#frameClip)">{scenes[scene] || scenes.retrato}<ThirdsGrid /></g>
          <rect x="1" y="1" width="318" height="198" rx="12" fill="none" stroke="#e3d8f6" strokeWidth="2" />
        </svg>
      );
    }

    function Logo({ size = 50 }) {
      const cx = 32, cy = 37;
      return (
        <svg className="brand-logo" viewBox="0 0 64 64" width={size} height={size} role="img" aria-label="KOM · Asistente de disparo">
          <defs>
            <linearGradient id="logoBody" x1="0.1" y1="0" x2="0.85" y2="1"><stop offset="0%" stopColor="#a382ec" /><stop offset="52%" stopColor="#7d55d2" /><stop offset="100%" stopColor="#5a32ab" /></linearGradient>
            <radialGradient id="logoWell" cx="50%" cy="36%" r="70%"><stop offset="0%" stopColor="#6a45b6" /><stop offset="100%" stopColor="#37206f" /></radialGradient>
            <radialGradient id="logoOpen" cx="50%" cy="38%" r="65%"><stop offset="0%" stopColor="#5c3aab" /><stop offset="100%" stopColor="#2c1a5d" /></radialGradient>
          </defs>
          <polygon points="23,13 26,6 38,6 41,13" fill="url(#logoBody)" />
          <rect x="3.5" y="12.5" width="57" height="46" rx="14.5" fill="url(#logoBody)" />
          <rect x="4.7" y="13.7" width="54.6" height="43.6" rx="13.3" fill="none" stroke="#ffffff" strokeOpacity="0.22" strokeWidth="1.3" />
          <circle cx="50.5" cy="21" r="2.3" fill="#ffffff" fillOpacity="0.85" />
          <circle cx={cx} cy={cy} r="17" fill="url(#logoWell)" />
          <circle cx={cx} cy={cy} r="17" fill="none" stroke="#ffffff" strokeOpacity="0.5" strokeWidth="2" />
          <circle cx={cx} cy={cy} r="13" fill="none" stroke="#ffffff" strokeOpacity="0.12" strokeWidth="0.8" />
          <polygon points={heptagon(cx, cy, 13)} fill="#efe7fb" />
          <g stroke="#b89cf0" strokeWidth="0.9" strokeLinecap="round">{[...Array(7)].map((_, i) => { const a = (Math.PI * 2 * i) / 7 - Math.PI / 2; return <line key={i} x1={cx + 13 * Math.cos(a)} y1={cy + 13 * Math.sin(a)} x2={cx + 9.2 * Math.cos(a)} y2={cy + 9.2 * Math.sin(a)} />; })}</g>
          <circle cx={cx} cy={cy} r="9.3" fill="url(#logoOpen)" />
          <circle cx={cx} cy={cy} r="9.3" fill="none" stroke="#ffffff" strokeOpacity="0.25" strokeWidth="0.8" />
          <text x={cx} y={cy + 2.9} textAnchor="middle" fontFamily="'Space Grotesk', sans-serif" fontWeight="700" fontSize="7.7" letterSpacing="-0.4" fill="#ffffff">KOM</text>
        </svg>
      );
    }

    function App() {
      const [sel, setSel] = useState({ subject: "retrato", light: "poca", motion: "quieto", priority: "desenfoque" });
      const [avail, setAvail] = useState([...LENS_ORDER]);
      const [saved, setSaved] = useState(() => { try { return JSON.parse(localStorage.getItem("a6400_situaciones") || "[]"); } catch (e) { return []; } });
      const [naming, setNaming] = useState(false);
      const [nameInput, setNameInput] = useState("");
      const [customSubjects, setCustomSubjects] = useState(() => { try { return JSON.parse(localStorage.getItem("a6400_subjects") || "[]"); } catch (e) { return []; } });
      const [addingSubj, setAddingSubj] = useState(false);
      const [subjName, setSubjName] = useState("");
      const [subjBase, setSubjBase] = useState("retrato");

      useEffect(() => { try { localStorage.setItem("a6400_situaciones", JSON.stringify(saved)); } catch (e) {} }, [saved]);
      useEffect(() => { try { localStorage.setItem("a6400_subjects", JSON.stringify(customSubjects)); } catch (e) {} }, [customSubjects]);

      const baseOf = (id) => { if (SUBJECTS[id]) return id; const c = customSubjects.find((x) => x.id === id); return c ? c.base : "retrato"; };
      const baseSubject = baseOf(sel.subject);
      const S = SUBJECTS[baseSubject] || SUBJECTS.retrato;
      const r = useMemo(() => recommend({ ...sel, subject: baseSubject }, avail), [sel, avail, baseSubject]);
      const lens = LENS[r.lens];
      const tips = S.framing;

      const toggleLens = (k) => setAvail((a) => (a.includes(k) ? (a.length > 1 ? a.filter((x) => x !== k) : a) : [...a, k]));
      const doSave = () => { const n = nameInput.trim(); if (!n) return; setSaved((s) => [...s, { id: Date.now(), name: n, sel: { ...sel } }]); setNameInput(""); setNaming(false); };
      const cancelSave = () => { setNameInput(""); setNaming(false); };
      const delSit = (id) => setSaved((s) => s.filter((i) => i.id !== id));
      const addSubject = () => { const n = subjName.trim(); if (!n) return; const id = "cs" + Date.now(); setCustomSubjects((cs) => [...cs, { id, name: n, base: subjBase }]); setSel((s) => ({ ...s, subject: id })); setSubjName(""); setSubjBase("retrato"); setAddingSubj(false); };
      const cancelSubj = () => { setSubjName(""); setSubjBase("retrato"); setAddingSubj(false); };
      const delSubject = (id) => { setCustomSubjects((cs) => cs.filter((c) => c.id !== id)); setSel((s) => (s.subject === id ? { ...s, subject: "retrato" } : s)); };

      return (
        <div className="wrap">
          <div className="inner">
            <div className="brandrow">
              <Logo />
              <div className="eyebrow"><span className="dot" />α6400 · asistente de disparo</div>
            </div>
            <h1>¿Qué saco ahora?</h1>
            <p className="lede">Elige tu situación y te digo qué lente montar y cómo dejar la cámara.</p>

            <div className="q">
              <div className="q-label">Lentes que llevas hoy</div>
              <div className="chips">{LENS_ORDER.map((k) => (<button key={k} className={"chip lens" + (avail.includes(k) ? " on" : "")} onClick={() => toggleLens(k)}>{LENS[k].name}</button>))}</div>
            </div>

            {QUESTIONS.map((q) => (
              <div className="q" key={q.key}>
                <div className="q-label">{q.label}</div>
                <div className="chips">
                  {q.options.map((o) => (<button key={o.v} className={"chip" + (sel[q.key] === o.v ? " on" : "")} onClick={() => setSel((s) => ({ ...s, [q.key]: o.v }))}>{o.t}</button>))}
                  {q.key === "subject" && customSubjects.map((c) => (
                    <span key={c.id} className={"sit-chip" + (sel.subject === c.id ? " on" : "")}>
                      <button className="sit-load" onClick={() => setSel((s) => ({ ...s, subject: c.id }))}>{c.name}</button>
                      <span className="sit-x" role="button" aria-label="Eliminar" onClick={() => delSubject(c.id)}>×</span>
                    </span>
                  ))}
                  {q.key === "subject" && !addingSubj && (<button className="add-chip" onClick={() => setAddingSubj(true)}>+ Agregar</button>)}
                </div>
                {q.key === "subject" && addingSubj && (
                  <div className="subj-form">
                    <input className="save-input" autoFocus value={subjName} placeholder="Nombre (ej. Surf, Conciertos, Autos)"
                      onChange={(e) => setSubjName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addSubject(); if (e.key === "Escape") cancelSubj(); }} />
                    <div className="subj-base-label">¿A cuál se parece?</div>
                    <div className="chips">{SUBJECT_ORDER.map((k) => (<button key={k} className={"chip" + (subjBase === k ? " on" : "")} onClick={() => setSubjBase(k)}>{SUBJECTS[k].t}</button>))}</div>
                    <div className="save-row"><button className="save-btn" disabled={!subjName.trim()} onClick={addSubject}>Agregar</button><button className="cancel-btn" onClick={cancelSubj} aria-label="Cancelar">✕</button></div>
                  </div>
                )}
              </div>
            ))}

            <div className="q">
              <div className="q-label">Mis situaciones</div>
              <div className="chips">
                {saved.map((s) => (<span key={s.id} className="sit-chip"><button className="sit-load" onClick={() => setSel(s.sel)}>{s.name}</button><span className="sit-x" role="button" aria-label="Eliminar" onClick={() => delSit(s.id)}>×</span></span>))}
                {!naming && <button className="add-chip" onClick={() => setNaming(true)}>+ Guardar actual</button>}
              </div>
              {naming && (
                <div className="save-row">
                  <input className="save-input" autoFocus value={nameInput} placeholder="Nombre (ej. Paseo tarde con bebé)"
                    onChange={(e) => setNameInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") doSave(); if (e.key === "Escape") cancelSave(); }} />
                  <button className="save-btn" disabled={!nameInput.trim()} onClick={doSave}>Guardar</button>
                  <button className="cancel-btn" onClick={cancelSave} aria-label="Cancelar">✕</button>
                </div>
              )}
              {saved.length === 0 && !naming && (<div className="hint">Configura los ajustes de arriba y guárdalos como una situación para volver con un toque.</div>)}
            </div>

            <div className="panel panel-top">
              <div className="lens-row"><div><div className="lens-name">{lens.name}</div><div className="lens-sub">{lens.sub}</div></div><div className="lens-tag">{lens.filter}</div></div>
              <div className="why">{r.whyText}</div>
              {r.swap && <div className="swap"><span>↺</span><span>{r.swap}</span></div>}
              <div className="divider" />
              <div className="readout">
                <Iris f={r.f} />
                <div className="stats">
                  <div><div className="stat-label">Apertura</div><div className="stat-val f">{r.fLabel}</div>{r.fNote && <div className="stat-note">{r.fNote}</div>}</div>
                  <div style={{ display: "flex", gap: 22 }}>
                    <div><div className="stat-label">Velocidad</div><div className="stat-val sm">{r.shutter}</div><div className="stat-note">{r.shutterNote}</div></div>
                    <div><div className="stat-label">ISO</div><div className="stat-val sm">Auto</div></div>
                  </div>
                </div>
              </div>
              <div className="divider" />
              <div className="meta">
                <div className="meta-row"><span className="meta-k">Modo</span><span className="meta-v">A · Prioridad de apertura</span></div>
                <div className="meta-row"><span className="meta-k">Enfoque</span><span className="meta-v focus">{r.focus}</span></div>
              </div>
              <div className="tip">{r.tip}</div>
              {r.warn ? (<div className="warn"><span>⚠</span><span>{r.warn}</span></div>) : (<div className="pad-b" />)}
            </div>

            <div className="frame-card">
              <div className="frame-head"><span className="frame-title">Cómo debería verse</span><span className="frame-badge">grilla de tercios</span></div>
              <div className="frame-media"><FrameExample scene={S.frame} /></div>
              <div className="frame-caption">El punto verde marca dónde clavar el enfoque.</div>
              <div className="tips"><div className="tips-h">Encuadre</div>{tips.map((t, i) => (<div className="tip-item" key={i}><span className="tip-num">{i + 1}</span><span>{t}</span></div>))}</div>
            </div>

            <p className="foot">Valores de partida, no reglas fijas. Tu A6400 no estabiliza el cuerpo: la velocidad es tu defensa contra el movido con los Sigma f/1.4.</p>

            <div className="credit">
              <div className="credit-logo"><Logo size={42} /></div>
              <div className="credit-by">Creado por <strong>Karina Orellana</strong></div>
              <div className="credit-msg">¿Quieres tu versión personalizada, para tu cámara y tus lentes? Escríbeme y la preparo para ti.</div>
              <a className="credit-mail" href="mailto:karinaorellanamoreira@gmail.com?subject=Quiero%20mi%20versi%C3%B3n%20personalizada%20del%20Asistente%20de%20disparo">karinaorellanamoreira@gmail.com</a>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
